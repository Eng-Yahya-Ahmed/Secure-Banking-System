{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7 col-lg-5">

        <div class="card shadow-sm border-0">

            <div class="card-body p-4 p-md-5">

                <h1 class="text-center mb-4">
                    Login
                </h1>

                <form method="POST">

                    <input
                        type="hidden"
                        name="csrf_token"
                        value="{{ csrf_token() }}"
                    >

                    <div class="mb-3">

                        <label
                            for="username"
                            class="form-label"
                        >
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            placeholder="Enter your username"
                            value="{{ request.form.get('username', '') }}"
                            autocomplete="username"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label
                            for="password"
                            class="form-label"
                        >
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary"
                        >
                            Login
                        </button>

                    </div>

                </form>

                <p class="text-center mt-4 mb-0">

                    Don't have an account?

                    <a href="{{ url_for('auth.register') }}">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
