{% extends "base.html" %}

{% block title %}
Transfer Money
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Transfer Money
                </h2>

                <div class="alert alert-info">
                    Current Balance:

                    <strong>
                        ${{ "%.2f"|format(account.balance) }}
                    </strong>
                </div>

                <form
                    method="POST"
                    action="{{ url_for('transfer.transfer') }}"
                >

                    <input
                        type="hidden"
                        name="csrf_token"
                        value="{{ csrf_token() }}"
                    >

                    <div class="mb-3">
                        <label
                            for="account_number"
                            class="form-label"
                        >
                            Receiver Account Number
                        </label>

                        <input
                            type="text"
                            id="account_number"
                            name="account_number"
                            class="form-control"
                            placeholder="Enter receiver account number"
                            maxlength="20"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="mb-3">
                        <label
                            for="amount"
                            class="form-label"
                        >
                            Amount
                        </label>

                        <input
                            type="number"
                            id="amount"
                            name="amount"
                            class="form-control"
                            min="0.01"
                            step="0.01"
                            placeholder="Enter amount"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Transfer
                    </button>

                </form>

                <a
                    href="{{ url_for('dashboard.dashboard') }}"
                    class="btn btn-link w-100 mt-3"
                >
                    Back to Dashboard
                </a>

            </div>
        </div>

    </div>
</div>

{% endblock %}
